version: '3.9'

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '${REDIS_PORT:-6379}:6379'
    command: ['redis-server', '--appendonly', 'yes']
    volumes:
      - redis-data:/data

  minio:
    image: quay.io/minio/minio
    command: server /data --console-address ":9001"
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-creepervote}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-creepervote}
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio-data:/data

  mariadb:
    image: mariadb:11.4
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-creepervote}
      MARIADB_USER: ${MARIADB_USER:-creepervote}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD:-creepervote}
      MARIADB_DATABASE: ${MARIADB_DATABASE:-creepervote}
    ports:
      - '${MARIADB_PORT:-3306}:3306'
    volumes:
      - mariadb-data:/var/lib/mysql

  api:
    build:
      context: ./apps/api
      target: production
    ports:
      - '3001:3000'
    env_file:
      - .env.local
    environment:
      NODE_ENV: production
      REDIS_URL: redis://redis:6379
      DATABASE_URL: mysql://${MARIADB_USER:-creepervote}:${MARIADB_PASSWORD:-creepervote}@mariadb:3306/${MARIADB_DATABASE:-creepervote}
      STORAGE_ENDPOINT: http://minio:9000
    depends_on:
      - redis
      - mariadb
      - minio

  web:
    build:
      context: ./apps/web
      target: production
    env_file:
      - .env.local
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_BASE_URL: http://api:3000
    depends_on:
      - api
    ports:
      - '3000:3000'

  worker:
    build:
      context: ./apps/worker
      target: production
    env_file:
      - .env.local
    environment:
      NODE_ENV: production
      REDIS_URL: redis://redis:6379
      DATABASE_URL: mysql://${MARIADB_USER:-creepervote}:${MARIADB_PASSWORD:-creepervote}@mariadb:3306/${MARIADB_DATABASE:-creepervote}
    depends_on:
      - redis
      - mariadb

volumes:
  redis-data:
  minio-data:
  mariadb-data:
