name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build-test:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: minewiki_test
          MYSQL_USER: minewiki
          MYSQL_PASSWORD: minewiki
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      DATABASE_URL: mysql://minewiki:minewiki@127.0.0.1:3306/minewiki_test
      REDIS_URL: redis://127.0.0.1:6379
      NODE_ENV: test
      NEXT_PUBLIC_SITE_URL: http://127.0.0.1:4311
      NEXT_PUBLIC_API_BASE_URL: /api
      INTERNAL_API_BASE_URL: http://127.0.0.1:3000
      API_HOST: 127.0.0.1
      API_PORT: 3000
      VERIFY_PUBLIC_BASE_URL: http://127.0.0.1:4311
      APP_ENCRYPTION_KEY: test-encryption-key
      INTERNAL_BOT_API_TOKEN: test-internal-bot-token
      PLUGIN_SYNC_TOKEN: test-plugin-sync-token
      ACCOUNT_LINKING_ENABLED: "true"
      DISCORD_CLIENT_ID: test-discord-client-id
      DISCORD_CLIENT_SECRET: test-discord-client-secret
      DISCORD_REDIRECT_URI: http://127.0.0.1:4311/auth/callback/discord
      MICROSOFT_CLIENT_ID: test-microsoft-client-id
      MICROSOFT_CLIENT_SECRET: test-microsoft-client-secret
      MICROSOFT_REDIRECT_URI: http://127.0.0.1:4311/minecraft/callback
      NAVER_CLIENT_ID: test-naver-client-id
      NAVER_CLIENT_SECRET: test-naver-client-secret
      NAVER_REDIRECT_URI: http://127.0.0.1:4311/auth/callback/naver
      UPLOAD_STORAGE_ROOT: /tmp/minewiki-test-uploads
      STORAGE_PUBLIC_BASE_URL: http://127.0.0.1:4311/uploads
      SMTP_FROM: "MineWiki Test <test@example.invalid>"

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm exec prisma generate

      - name: Deploy test database
        run: pnpm db:deploy

      - name: Typecheck packages
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Validate PM2 service configuration
        run: pnpm pm2:validate

      - name: Validate permission-aware upload routing
        run: pnpm gateway:validate

      - name: Build API
        run: pnpm build:api

      - name: API runtime wiring
        run: pnpm --dir apps/api test:runtime

      - name: Build Web
        run: pnpm build:web

      - name: Unit tests
        env:
          DATABASE_URL: ""
        run: pnpm test:unit

      - name: Integration tests
        run: pnpm test:integration

      - name: Install Playwright Chromium
        run: pnpm --dir apps/web exec playwright install --with-deps chromium

      - name: Browser end-to-end tests
        env:
          E2E_BASE_URL: http://127.0.0.1:4311
        run: |
          set -euo pipefail
          pnpm --dir apps/api start >/tmp/minewiki-api.log 2>&1 &
          API_PID=$!
          pnpm --dir apps/web exec next start -p 4311 >/tmp/minewiki-web.log 2>&1 &
          WEB_PID=$!

          cleanup() {
            status=$?
            trap - EXIT
            kill "$WEB_PID" "$API_PID" 2>/dev/null || true
            wait "$WEB_PID" "$API_PID" 2>/dev/null || true
            if [ "$status" -ne 0 ]; then
              sed -n '1,240p' /tmp/minewiki-api.log
              sed -n '1,240p' /tmp/minewiki-web.log
            fi
            exit "$status"
          }
          trap cleanup EXIT

          for attempt in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:3000/ready >/dev/null \
              && curl -fsS http://127.0.0.1:4311/ >/dev/null; then
              break
            fi
            if [ "$attempt" -eq 60 ]; then
              echo 'API or web server did not become ready in time.' >&2
              exit 1
            fi
            sleep 1
          done

          pnpm --dir apps/web test:e2e

  compose-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install smoke-test dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare disposable Compose environment
        run: |
          cp .env.example .env
          sed -i \
            -e 's/^MINEWIKI_DB_PASSWORD=.*/MINEWIKI_DB_PASSWORD=ci-db-password-2026/' \
            -e 's/^MINEWIKI_DB_ROOT_PASSWORD=.*/MINEWIKI_DB_ROOT_PASSWORD=ci-root-password-2026/' \
            -e 's/^INTERNAL_BOT_API_TOKEN=.*/INTERNAL_BOT_API_TOKEN=ci-bot-token-2026/' \
            -e 's/^PLUGIN_SYNC_TOKEN=.*/PLUGIN_SYNC_TOKEN=ci-plugin-token-2026/' \
            -e 's/^APP_ENCRYPTION_KEY=.*/APP_ENCRYPTION_KEY=ci-encryption-key-2026/' \
            -e 's/^NEXT_PUBLIC_TURNSTILE_SITE_KEY=.*/NEXT_PUBLIC_TURNSTILE_SITE_KEY=ci-turnstile-site-2026/' \
            -e 's/^TURNSTILE_SECRET_KEY=.*/TURNSTILE_SECRET_KEY=ci-turnstile-secret-2026/' \
            -e 's/^SMTP_HOST=.*/SMTP_HOST=mail.invalid/' \
            .env

      - name: Build all production images
        run: docker compose --profile bot build

      - name: Start fresh Compose stack
        run: docker compose up -d

      - name: Smoke-test gateway and seeded application
        env:
          SMOKE_WEB_BASE_URL: http://127.0.0.1:8080
          SMOKE_API_BASE_URL: http://127.0.0.1:8080/api
        run: pnpm smoke

      - name: Show Compose logs on failure
        if: failure()
        run: docker compose logs --no-color --tail=300

      - name: Tear down Compose stack
        if: always()
        run: docker compose down -v
