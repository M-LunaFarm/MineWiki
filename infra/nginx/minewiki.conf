upstream minewiki_web {
  server 127.0.0.1:4320;
}

upstream minewiki_api {
  server 127.0.0.1:4321;
}

upstream minewiki_verify_web {
  server 127.0.0.1:4322;
}

# Expected local ports:
# - minewiki-web: 127.0.0.1:4320
# - minewiki-api: 127.0.0.1:4321
#
# HTTPS example:
#   certbot --nginx -d minewiki.kr -d www.minewiki.kr
# Keep this HTTP server block as the certbot target or redirect it to HTTPS after issuance.
server {
  listen 80;
  server_name minewiki.kr www.minewiki.kr;
  include /etc/nginx/snippets/minewiki-cloudflare-real-ip.conf;

  client_max_body_size 8m;

  gzip on;
  gzip_vary on;
  gzip_types
    application/javascript
    application/json
    application/rss+xml
    application/xml
    image/svg+xml
    text/css
    text/javascript
    text/plain
    text/xml;

  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header X-Frame-Options "SAMEORIGIN" always;

  location = /api/health {
    proxy_pass http://minewiki_api/health;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
    add_header Cache-Control "no-store" always;
  }

  location ~ ^/api/v1/wiki/discussions/[0-9]+/events$ {
    rewrite ^/api/(.*)$ /$1 break;
    proxy_pass http://minewiki_api;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 75s;
    add_header X-Accel-Buffering "no" always;
    add_header Cache-Control "no-store, no-transform" always;
  }

  # Internal worker and provisioner endpoints are loopback-only.  Do not let
  # public ingress rely on bearer-token secrecy as its only trust boundary.
  location = /api/v1/internal {
    return 404;
  }

  location ^~ /api/v1/internal/ {
    return 404;
  }

  location /api/ {
    rewrite ^/api/(.*)$ /$1 break;
    proxy_pass http://minewiki_api;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
    add_header Cache-Control "no-store" always;
  }

  location /_next/static/ {
    proxy_pass http://minewiki_web;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
  }

  location /uploads/ {
    rewrite ^/uploads/([^/]+)$ /v1/files/public/$1/raw break;
    proxy_pass http://minewiki_api;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    proxy_pass http://minewiki_web;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

server {
  listen 80;
  server_name verify.minewiki.kr;
  include /etc/nginx/snippets/minewiki-cloudflare-real-ip.conf;

  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "no-referrer" always;
  add_header X-Frame-Options "DENY" always;
  add_header Cache-Control "no-store" always;

  location /_next/ {
    proxy_pass http://minewiki_verify_web;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location = /minecraft/callback {
    proxy_pass http://minewiki_verify_web;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    return 302 https://minewiki.kr/me;
  }
}
