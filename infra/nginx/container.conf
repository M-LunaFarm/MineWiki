events {}

http {
  upstream minewiki_web {
    server web:3000;
  }

  upstream minewiki_api {
    server api:3000;
  }

  server {
    listen 80;
    server_name verify.minewiki.kr;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header X-Frame-Options "DENY" always;
    add_header Cache-Control "no-store" always;

    location /_next/ {
      proxy_pass http://minewiki_web;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $remote_addr;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /minecraft/callback {
      proxy_pass http://minewiki_web;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $remote_addr;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
      return 302 https://minewiki.kr/me;
    }
  }

  server {
    listen 80;
    server_name _;

    client_max_body_size 8m;

    gzip on;
    gzip_vary on;
    gzip_types application/javascript application/json application/xml image/svg+xml text/css text/plain;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options "SAMEORIGIN" always;

    location = /api/health {
      proxy_pass http://minewiki_api/health;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $remote_addr;
      proxy_set_header X-Forwarded-Proto $scheme;
      add_header Cache-Control "no-store" always;
    }

    location /api/ {
      rewrite ^/api/(.*)$ /$1 break;
      proxy_pass http://minewiki_api;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $remote_addr;
      proxy_set_header X-Forwarded-Proto $scheme;
      add_header Cache-Control "no-store" always;
    }

    location /uploads/ {
      rewrite ^/uploads/([^/]+)$ /v1/files/public/$1/raw break;
      proxy_pass http://minewiki_api;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $remote_addr;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /_next/static/ {
      proxy_pass http://minewiki_web;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto $scheme;
      expires 1y;
      add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    location / {
      proxy_pass http://minewiki_web;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $remote_addr;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
