server {
    server_name test.152.kr;

    listen [::]:443 ssl;
    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/test.152.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/test.152.kr/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://minewiki.kr$request_uri;
}

server {
    listen 80;
    listen [::]:80;
    server_name test.152.kr;

    return 301 https://minewiki.kr$request_uri;
}
